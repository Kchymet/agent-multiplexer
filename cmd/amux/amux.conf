# amux — isolated tmux server config.
#
# This file configures ONLY the `tmux -L amux` server. It is fully separate
# from your default tmux server and your ~/.tmux.conf, which are left untouched.
# It is materialized to ~/.config/amux/amux.conf by `amux init`.

# ---- terminal / color ----------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set-environment -g COLORTERM "truecolor"

# OSC 52 clipboard (works locally, over SSH, and nested).
set -g set-clipboard on
set -ga terminal-overrides ',*:Ms=\E]52;%p1%s;%p2%s\7'

# ---- agent-friendly behavior ---------------------------------------------
set -g history-limit 50000
set -g mouse on
set -g focus-events on
set -sg escape-time 1

# Claude Code integration: passthrough for progress/notifications + extended
# keys for Shift+Enter and clean PgUp/PgDn.
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ---- prefix + keys -------------------------------------------------------
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Open the full-screen dashboard in a popup (prefix + g).
bind g display-popup -E -w 90% -h 90% "amux dash"

# Open (or switch to) the amux control console — configure amux (prefix + C).
bind C run-shell "amux console"

# Spawn a fresh Claude agent in its own window (prefix + c is new-window; we add
# prefix + a opens the interactive new-session creator (same as `n` in the rail).
bind a display-popup -E -w 80% -h 80% "amux session new"

# Reload this config (prefix + r).
bind r source-file ~/.config/amux/amux.conf \; display-message "amux config reloaded"

# vim-like pane navigation (with the prefix): C-a h focuses the rail, C-a l returns.
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# No-prefix focus jumps: Alt+h into the rail, Alt+l back to your work.
# (Remove these two lines if Alt+h/Alt+l clash with an app you run.)
bind -n M-h select-pane -L
bind -n M-l select-pane -R
# Alt+a toggles between the rail and your last pane.
bind -n M-a select-pane -l
# Alt+q detaches amux (leaves all sessions/agents running). Same as C-a d.
bind -n M-q detach-client

# ---- the persistent side-pane dashboard ----------------------------------
# Every new window (and the first one) gets a narrow rail pane on the left
# running `amux rail`. The rail-attach helper is idempotent (it marks its
# pane with @amx=rail and won't add a second one).
set-hook -g after-new-session 'run-shell "amux rail-attach #{window_id}"'
set-hook -g after-new-window  'run-shell "amux rail-attach #{window_id}"'

# ---- pane border hints ---------------------------------------------------
# A per-pane hint on the top border: how to reach the workspace panel (rail)
# from your work, how to get back from the rail, and how to detach amux.
set -g pane-border-status top
set -g pane-border-style "fg=#3d4350"
set -g pane-active-border-style "fg=#39bae6"
set -g pane-border-format "#{?#{==:#{@amx},rail}, ⌂ amux  ·  Alt+l → work , ↤ Alt+h (or C-a h) → workspaces panel   ·   Alt+q detach }"

# ---- status line ---------------------------------------------------------
set -g status on
set -g status-interval 2
set -g status-justify left
set -g status-style "bg=#1f2430 fg=#bfbdb6"
set -g status-left "#[bg=#39bae6,fg=#0d1017,bold] amux #[bg=#1f2430,fg=#39bae6]"
set -g status-left-length 20
set -g status-right "#[fg=#5c6773]Alt+q detach  #[fg=#3d4350]│  #[fg=#5c6773]#h #[fg=#39bae6]%H:%M "
set -g status-right-length 50
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bg=#39bae6,fg=#0d1017,bold] #I:#W "
